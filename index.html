<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evaluasi Gelombang Bunyi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    border:1px solid #334155;
}

.option{
    transition:0.2s;
}

.option:hover{
    transform:scale(1.02);
    background:#334155;
}

</style>
</head>

<body class="min-h-screen flex items-center justify-center p-5">

<div class="max-w-4xl w-full">

    <!-- QUIZ -->

    <div class="card" id="quizBox">

        <h1 class="text-4xl font-bold text-center text-cyan-300 mb-2">
            Evaluasi Gelombang Bunyi
        </h1>

        <p class="text-center text-slate-300 mb-8">
            Materi: Gelombang Bunyi dan Efek Doppler
        </p>

        <!-- Progress -->

        <div class="flex justify-between items-center mb-6">

            <span
                id="nomorSoal"
                class="bg-cyan-400 text-black px-4 py-1 rounded-full font-bold"
            >
                Soal 1
            </span>

            <span
                id="progressText"
                class="text-slate-300"
            >
                1 / 5
            </span>

        </div>

        <!-- Pertanyaan -->

        <h2
            id="pertanyaan"
            class="text-2xl font-bold mb-6 leading-relaxed"
        >
        </h2>

        <!-- Pilihan -->

        <div
            id="pilihanContainer"
            class="space-y-4"
        >
        </div>

        <!-- Tombol -->

        <div class="flex justify-between mt-8">

            <button
                id="prevBtn"
                class="bg-slate-700 px-6 py-3 rounded-xl font-bold"
            >
                ⬅ Previous
            </button>

            <button
                id="nextBtn"
                class="bg-cyan-400 text-black px-6 py-3 rounded-xl font-bold"
            >
                Next ➜
            </button>

        </div>

    </div>

    <!-- HASIL -->

    <div
        id="hasilBox"
        class="hidden card text-center"
    >

        <h2 class="text-4xl font-bold text-cyan-300 mb-4">
            Hasil Evaluasi
        </h2>

        <p
            id="nilaiText"
            class="text-6xl font-bold mb-4"
        >
            100
        </p>

        <p
            id="pesanText"
            class="text-xl text-slate-300"
        >
        </p>

        <button
            onclick="location.reload()"
            class="mt-8 bg-cyan-400 text-black px-6 py-3 rounded-xl font-bold"
        >
            Ulangi Quiz
        </button>

    </div>

</div>

<script>

const soal = [

{
    pertanyaan:
    "1. Mengapa gelombang bunyi tidak dapat merambat di ruang hampa?",

    pilihan:[
        "Karena bunyi membutuhkan cahaya",
        "Karena bunyi termasuk gelombang mekanik yang membutuhkan medium",
        "Karena bunyi hanya dapat merambat di udara",
        "Karena bunyi memiliki frekuensi kecil"
    ],

    jawaban:1
},

{
    pertanyaan:
    "2. Seorang siswa mendengar bunyi dengan frekuensi 680 Hz. Jika cepat rambat bunyi di udara 340 m/s, maka panjang gelombangnya adalah ...",

    pilihan:[
        "0,5 m",
        "1 m",
        "2 m",
        "4 m"
    ],

    jawaban:0
},

{
    pertanyaan:
    "3. Ketika gitar dipetik semakin kuat, maka yang bertambah adalah ...",

    pilihan:[
        "Frekuensi bunyi",
        "Cepat rambat bunyi",
        "Amplitudo bunyi",
        "Panjang gelombang"
    ],

    jawaban:2
},

{
    pertanyaan:
    "4. Sebuah ambulans bergerak mendekati pengamat sambil membunyikan sirine. Pengamat akan mendengar frekuensi yang ...",

    pilihan:[
        "Lebih rendah dari frekuensi asli",
        "Tetap sama",
        "Lebih tinggi dari frekuensi asli",
        "Tidak dapat didengar"
    ],

    jawaban:2
},

{
    pertanyaan:
    "5. Bunyi pantul yang terdengar setelah bunyi asli selesai disebut ...",

    pilihan:[
        "Resonansi",
        "Gaung",
        "Gema",
        "Interferensi"
    ],

    jawaban:2
}

];

let indexSoal = 0;

let jawabanUser = [];

const pertanyaan =
document.getElementById("pertanyaan");

const pilihanContainer =
document.getElementById("pilihanContainer");

function tampilkanSoal(){

    let s = soal[indexSoal];

    document.getElementById(
        "nomorSoal"
    ).innerText =
    "Soal " + (indexSoal + 1);

    document.getElementById(
        "progressText"
    ).innerText =
    (indexSoal + 1) + " / " + soal.length;

    pertanyaan.innerText =
    s.pertanyaan;

    pilihanContainer.innerHTML = "";

    s.pilihan.forEach((p,i)=>{

        let label =
        document.createElement("label");

        label.className =
        "option block bg-slate-700 p-4 rounded-xl cursor-pointer";

        label.innerHTML = `

            <input
                type="radio"
                name="jawaban"
                value="${i}"
                class="mr-3"
            >

            ${p}

        `;

        pilihanContainer.appendChild(label);

        const radio =
        label.querySelector("input");

        if(jawabanUser[indexSoal] == i){

            radio.checked = true;
        }

        radio.addEventListener("change",()=>{

            jawabanUser[indexSoal] = i;
        });
    });

    // Tombol previous

    document.getElementById(
        "prevBtn"
    ).style.visibility =
    indexSoal === 0
    ? "hidden"
    : "visible";

    // Tombol next

    document.getElementById(
        "nextBtn"
    ).innerText =
    indexSoal === soal.length - 1
    ? "Selesai"
    : "Next ➜";
}

tampilkanSoal();


// NEXT

document.getElementById(
    "nextBtn"
).addEventListener("click",()=>{

    if(
        jawabanUser[indexSoal]
        === undefined
    ){

        alert(
            "Silakan pilih jawaban terlebih dahulu!"
        );

        return;
    }

    if(indexSoal < soal.length - 1){

        indexSoal++;

        tampilkanSoal();

    }else{

        tampilkanHasil();
    }
});


// PREVIOUS

document.getElementById(
    "prevBtn"
).addEventListener("click",()=>{

    if(indexSoal > 0){

        indexSoal--;

        tampilkanSoal();
    }
});


// HASIL

function tampilkanHasil(){

    let skor = 0;

    soal.forEach((s,i)=>{

        if(jawabanUser[i] === s.jawaban){

            skor += 20;
        }
    });

    document.getElementById(
        "quizBox"
    ).classList.add("hidden");

    document.getElementById(
        "hasilBox"
    ).classList.remove("hidden");

    document.getElementById(
        "nilaiText"
    ).innerText =
    skor;

    let pesan = "";

    if(skor === 100){

        pesan =
        "Luar biasa! Semua jawaban benar.";

    }else if(skor >= 80){

        pesan =
        "Bagus! Pemahamanmu sangat baik.";

    }else if(skor >= 60){

        pesan =
        "Cukup baik, tetapi masih perlu latihan.";

    }else{

        pesan =
        "Ayo belajar lagi agar lebih memahami materi.";
    }

    document.getElementById(
        "pesanText"
    ).innerText = pesan;
}

</script>

</body>
</html>
